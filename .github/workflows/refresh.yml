name: Daily data refresh

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC daily (~7am ET) — refreshes news + legislation
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh news + legislation
        env:
          NYSENATE_API_KEY: ${{ secrets.NYSENATE_API_KEY }}
        run: python3 build/refresh.py
      - name: Commit if changed
        run: |
          git config user.name "district-portal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json data/legislation.json data/portal_data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
